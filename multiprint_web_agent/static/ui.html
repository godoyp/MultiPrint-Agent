<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MultiPrint Web Agent</title>
  <link rel="stylesheet" href="/static/css/ui.css">
  <link rel="icon" href="/static/images/logo.png" type="image/x-icon">
</head>
<body>

  <!-- Header Bar -->
  <header class="top-bar">
    <div class="top-left">
      <img src="/static/images/logo.png" class="logo">
      <span class="title">MultiPrint Web Agent</span>
    </div>

    <div class="top-status">
      <span id="agent-status" class="badge online">Online</span>
      <span id="https-status" class="badge online">HTTPS</span>
      <span>Laser: <strong id="laser-printer">-</strong></span>
      <span>Thermal: <strong id="thermal-printer">-</strong></span>
      <span>Port: <strong id="agent-port">-</strong></span>
      <span>Agent Version: <strong id="agent-version">-</strong></span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-wrapper">
    <div class="main-container">

      <!-- Printer Configuration -->
      <div class="card printer-config">
        <h3>Printer Configuration</h3>

        <div class="form-group">
          <label for="thermal-printers">Thermal printer (ZPL labels)</label>
          <select id="thermal-printers"></select>
        </div>

        <div class="form-group">
          <label for="laser-printers">Laser printer (PDF / documents)</label>
          <select id="laser-printers"></select>
        </div>

        <div class="button-group">
          <button id="btn-save">💾 Save configuration</button>
          <button id="btn-reload">🔄 Reload Printers</button>
        </div>

        <button id="btn-test-print" class="btn-test">🧪 Print Test</button>
      </div>

      <!-- Logs -->
      <div class="card logs">
        <h3>Real-Time Log</h3>
        <div id="logs"></div>
      </div>
    </div>

  </main>

  <div id="toast-container"></div>

  <script type="module" src="/static/js/init.js"></script>
</body>
</html>
