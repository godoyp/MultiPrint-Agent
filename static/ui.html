<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Local Print Agent</title>
  <link rel="stylesheet" href="/static/css/ui.css">
</head>
<body>
  <h1>🖨️ Local Print Agent</h1>

  <div class="status-logs-container">
    <div class="card status">
      <h3>Agent Status</h3>
      <p><strong>Status:</strong> <span id="agent-status">-</span></p>
      <p><strong>Active Printer:</strong> <span id="active-printer">-</span></p>
      <p><strong>Port:</strong> <span id="agent-port">-</span></p>
      <p><strong>Secure Connection:</strong> <span id="https-status">-</span></p>
      <p><strong>Version:</strong> <span id="agent-version">-</span></p>
    </div>

    <div class="card logs">
      <h3>Real-Time Log</h3>
      <div id="logs"></div>
    </div>
  </div>

  <div class="card">
    <label>Printers</label>
    <select id="printers"></select>
    <button id="btn-save">💾 Save</button>
    <button id="btn-reload">🔄 Reload Printers</button>
  </div>

  <div class="card card-btntest">
    <button id="btn-test-print">🧪 Print Test</button>
  </div>

  <div id="status"></div>

  <div id="toast-container"></div>

  <script type="module" src="/static/js/init.js"></script>
</body>
</html>
